# Namespace for deployment
namespace: cv

# Full domain including subdomain (e.g., cv.boysthings.top)
domain: cv.boysthings.top

# Shared image configuration for all services
image:
  repository: ghcr.io/sekretk/cv
  tag: latest
  pullPolicy: Always

# English service (English CV)
english:
  name: english-service
  urlPath: /eng  # URL path prefix for routing
  replicaCount: 1
  containerPort: 6002  # Port the container listens on
  service:
    type: ClusterIP
    port: 80  # Service port (external)
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Russian service (Russian CV)
russian:
  name: russian-service
  urlPath: /rus  # URL path prefix for routing
  replicaCount: 1
  containerPort: 6003  # Port the container listens on
  service:
    type: ClusterIP
    port: 80  # Service port (external)
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Static service (Static Files - PDFs, images, etc.)
static:
  name: static-service
  urlPath: /static  # URL path prefix for routing
  replicaCount: 1
  containerPort: 6001  # Port the container listens on
  service:
    type: ClusterIP
    port: 80  # Service port (external)
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Ingress configuration
ingress:
  enabled: true
  name: cv-ingress
  className: traefik
  annotations: {}
  tls:
    enabled: true
    secretName: boysthings-top-wildcard-tls

# cert-manager: automatic Let's Encrypt renewal for the Ingress TLS secret.
# Prereqs (cluster admin, once per cluster):
#   1) Install cert-manager — https://cert-manager.io/docs/installation/
#   2) Create a ClusterIssuer (e.g. letsencrypt-prod) with an ACME HTTP-01
#      solver for this hostname. Wildcard certs (*.domain) require DNS-01 and
#      a DNS solver in the ClusterIssuer, not HTTP-01.
# Then set certManager.enabled: true and clusterIssuerName to match.
certManager:
  enabled: false
  certificateName: cv-tls
  clusterIssuerName: letsencrypt-prod
  additionalDnsNames: []

