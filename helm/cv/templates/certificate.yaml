{{- if and .Values.certManager.enabled .Values.ingress.enabled .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificateName }}
  labels:
    {{- include "multi-language-webserver.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: {{ .Values.certManager.clusterIssuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - {{ .Values.domain }}
    {{- range .Values.certManager.additionalDnsNames }}
    - {{ . }}
    {{- end }}
{{- end }}
